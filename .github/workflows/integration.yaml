name: ci_integration

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-e2e-sdk:
    name: Sdk integration tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include:
          - name: swap-core
            target: integrationtest-swap-core
          - name: wallet
            target: integrationtest-wallet
          - name: tx-exit
            target: integrationtest-tx-exit
          - name: assets-hd
            target: integrationtest-assets-hd
          - name: vhtlc
            target: integrationtest-vhtlc
          - name: stress
            target: integrationtest-stress
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
      
      - run: go mod tidy
      
      - name: Run Nigiri
        uses: vulpemventures/nigiri-github-action@v1
      
      - name: Run regtest environment
        run: make regtest

      - name: Run tests
        run: make ${{ matrix.target }}

      - name: Dump Docker diagnostics
        if: failure()
        run: |
          echo "::group::docker ps"
          docker ps -a
          echo "::endgroup::"
          echo "::group::docker compose ps"
          docker compose -f test/infra/docker-compose.yml ps || true
          echo "::endgroup::"
          echo "::group::docker compose logs"
          docker compose -f test/infra/docker-compose.yml logs --no-color --tail=300 || true
          echo "::endgroup::"
          for container in bitcoin chopsticks electrs lnd cln; do
            echo "::group::docker logs $container"
            docker logs --tail=200 "$container" || true
            echo "::endgroup::"
          done
