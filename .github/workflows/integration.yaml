name: ci_integration

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test-e2e-sdk:
    name: Sdk integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26.4'
      
      - run: go mod tidy
      
      - name: Run Nigiri
        uses: vulpemventures/nigiri-github-action@v1
      
      - name: Run regtest environment
        run: make regtest

      - name: Run tests
        run: make integrationtest

      - name: Docker logs
        if: failure()
        continue-on-error: true
        run: |
          docker image ls -a
          docker ps -a
          docker compose -f test/docker/docker-compose.yml ps
          docker compose -f test/docker/docker-compose.yml logs --no-color --timestamps pgnbxplorer nbxplorer arkd-wallet arkd
