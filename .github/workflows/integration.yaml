name: ci_integration

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test-e2e-sdk:
    name: Sdk integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'

      - run: go mod tidy

      - name: Cache nigiri build
        uses: actions/cache@v4
        with:
          path: regtest/_build
          key: nigiri-${{ hashFiles('regtest/.env.defaults', '.env.regtest') }}

      - name: Start regtest environment
        run: chmod +x regtest/*.sh regtest/helpers/*.sh && make regtest

      - name: Run tests
        run: make integrationtest

      - name: Capture logs on failure
        if: failure()
        run: |
          docker logs arkd 2>&1 || true
          docker logs ark-wallet 2>&1 || true

      - name: Cleanup
        if: always()
        run: make regtestclean