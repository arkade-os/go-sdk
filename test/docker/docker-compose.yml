services:
    # nbxplorer (and its postgres) come from the arkade-regtest base stack on
    # the shared network; arkd-wallet reaches it at http://nbxplorer:32838.
    arkd-wallet:
        restart: unless-stopped
        build:
            context: .
            dockerfile: wallet.Dockerfile
        container_name: arkd-wallet
        ports:
            - "6060:6060"
        environment:
            - ARKD_WALLET_LOG_LEVEL=5
            - ARKD_WALLET_NBXPLORER_URL=http://nbxplorer:32838
            - ARKD_WALLET_NETWORK=regtest
            - ARKD_WALLET_SIGNER_KEY=afcd3fa10f82a05fddc9574fdb13b3991b568e89cc39a72ba4401df8abef35f0
        volumes:
            - type: tmpfs
              target: /app/data
    arkd:
        build:
            context: .
            dockerfile: server.Dockerfile
        container_name: arkd
        restart: unless-stopped
        depends_on:
            - arkd-wallet
        ports:
            - "7070:7070"
            - "7071:7071"
        environment:
            - ARKD_LOG_LEVEL=5
            - ARKD_NO_MACAROONS=true
            - ARKD_VTXO_TREE_EXPIRY=20
            - ARKD_PUBLIC_UNILATERAL_EXIT_DELAY=10
            - ARKD_UNILATERAL_EXIT_DELAY=10
            - ARKD_BOARDING_EXIT_DELAY=30
            - ARKD_CHECKPOINT_EXIT_DELAY=10
            - ARKD_WALLET_ADDR=arkd-wallet:6060
            - ARKD_ESPLORA_URL=http://mempool_web/api
            - ARKD_VTXO_MIN_AMOUNT=1
            - ARKD_LIVE_STORE_TYPE=inmemory
            - ARKD_EVENT_DB_TYPE=badger
            - ARKD_DB_TYPE=sqlite
            - ARKD_SESSION_DURATION=10
        volumes:
            - type: tmpfs
              target: /app/data

networks:
    default:
        # Default network of the arkade-regtest compose project (regtest/ submodule).
        name: arkade-regtest_default
        external: true
