# Regtest shim in front of mempool_web (arkade-regtest base stack).
#
# The SDK's explorer (client-lib mempool explorer) calls esplora's
# GET /api/fee-estimates while building unilateral-exit bump transactions, but
# the mempool backend does not implement that endpoint (its frontend rewrites
# /api/<x> to the backend's /api/v1/<x>, which 404s with an HTML page). Serve
# an empty estimate set — the explorer falls back to 1 sat/vB, which is right
# for regtest — and proxy everything else through to mempool_web.
server {
    listen 80;

    location = /api/fee-estimates {
        default_type application/json;
        return 200 '{}';
    }

    # mempool's websocket endpoint needs the upgrade headers forwarded.
    location /api/v1/ws {
        proxy_pass http://mempool_web/api/v1/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    location / {
        proxy_pass http://mempool_web;
        proxy_set_header Host $host;
    }
}
